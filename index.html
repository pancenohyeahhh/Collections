<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ray Style</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:30px;
}

.container{
max-width:450px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#facc15;
font-size:18px;
cursor:pointer;
}

h1{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 Ray Style</h1>

<div class="card">

<img src="https://picsum.photos/400/300">

<h2>Kaos Band</h2>

<p>Harga Rp189.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Beli di Shopee</button>
</a>

</div>

<div class="card">

<img src="https://picsum.photos/400/301">

<h2>Cargo Pants</h2>

<p>Harga Rp249.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Beli di Shopee</button>
</a>

</div>

</div>

</body>
</html>
