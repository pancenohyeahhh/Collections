<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ray Style</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f4f4;
padding:25px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

#search{
width:100%;
padding:15px;
font-size:16px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:25px;
outline:none;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.card h2{
font-size:20px;
margin-bottom:8px;
}

.price{
color:#ee4d2d;
font-weight:bold;
margin-bottom:15px;
font-size:18px;
}

button{
width:100%;
padding:14px;
background:#facc15;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#f4b400;
}

.notfound{
text-align:center;
display:none;
color:gray;
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 Ray Style</h1>

<input
type="text"
id="search"
placeholder="🔍 Cari produk..."
onkeyup="searchProduct()">

<div class="card product">

<img src="https://picsum.photos/400/300">

<h2>Kaos Band</h2>

<p class="price">Rp189.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Lihat di Shopee</button>
</a>

</div>

<div class="card product">

<img src="https://picsum.photos/400/301">

<h2>Cargo Pants</h2>

<p class="price">Rp249.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Lihat di Shopee</button>
</a>

</div>

<div class="card product">

<img src="https://picsum.photos/400/302">

<h2>Flannel Oversize</h2>

<p class="price">Rp299.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Lihat di Shopee</button>
</a>

</div>

<div class="card product">

<img src="https://picsum.photos/400/303">

<h2>Converse Chuck 70</h2>

<p class="price">Rp799.000</p>

<a href="https://shopee.co.id" target="_blank">
<button>Lihat di Shopee</button>
</a>

</div>

<p class="notfound" id="notfound">
Produk tidak ditemukan 😢
</p>

</div>

<script>

function searchProduct(){

let keyword=document.getElementById("search").value.toLowerCase();

let products=document.querySelectorAll(".product");

let found=false;

products.forEach(function(product){

let title=product.querySelector("h2").innerText.toLowerCase();

if(title.includes(keyword)){

product.style.display="block";

found=true;

}else{

product.style.display="none";

}

});

document.getElementById("notfound").style.display=found?"none":"block";

}

</script>

</body>

</html>
